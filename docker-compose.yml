services:
  iot-dashboard:
    build: .
    container_name: iot-dashboard
    working_dir: /app
    environment:
      TZ: Asia/Seoul
      DB_NAME: /app/iot_data.db
      DB_JOURNAL_MODE: DELETE
      DB_LOCK_RETRIES: 10
      DB_BUSY_TIMEOUT_MS: 30000
      SYSTEM_MODE: docker
      SYSTEM_LOCK_FILE: /app/runtime/iot_dashboard.lock
    ports:
      - "5000:5000"
    volumes:
      - ./iot_data.db:/app/iot_data.db
      - ./runtime:/app/runtime
      - ./config.json:/app/config.json:ro
      - ./experiment_results:/app/experiment_results
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: "no"
