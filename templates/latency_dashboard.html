<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Advanced Latency Analytics</title>

    <link rel="stylesheet" href="/static/css/dashboard_common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/common_menu.js"></script>
    
    <style>
        .chart-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
        .chart-row { display: flex; gap: 20px; }
        .chart-col { flex: 1; min-width: 0; }
    </style>
</head>

<body>
<div class="layout">

    <aside class="sidebar">
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
        <div id="commonMenu"></div>
        
        <div class="info-box">
            <h3>Latency Analytics</h3>
            <p style="font-size: 13px; color: #4b5563;">토픽별 E2E Latency의 구간(Histogram) 분포 및 시간에 따른 이동평균선(Trend) 변화를 분석합니다.</p>
        </div>
        
        <div class="info-box">
            <h3>조회 설정</h3>
            <label>
                Topic 검색
                <input type="text" id="topicInput" placeholder="all" style="width: 100%; margin-top:5px; margin-bottom:10px;">
            </label>
            <button onclick="refreshAll()" style="width:100%; padding:8px; background:#2563eb; color:white; border:none; border-radius:4px; cursor:pointer;">조회하기</button>
        </div>
    </aside>

    <main class="main">
        <div class="main-header">
            <h2>Advanced Latency Analytics</h2>
            <div>히스토그램 및 레이턴시 트렌드 추적</div>
        </div>

        <section class="dashboard-section">
            <div class="chart-row">
                <div class="chart-col chart-box">
                    <h3 style="margin-top:0;">Latency Histogram (분포)</h3>
                    <canvas id="histogramChart" style="max-height: 300px;"></canvas>
                </div>
                <div class="chart-col chart-box">
                    <h3 style="margin-top:0;">Latency Trend (이동평균)</h3>
                    <canvas id="trendChart" style="max-height: 300px;"></canvas>
                </div>
            </div>
        </section>

    </main>
</div>

<script>
    let histogramChartObj = null;
    let trendChartObj = null;

    async function fetchHistogram(topic) {
        let url = "/api/latency-histogram?limit=1000";
        if (topic) url += "&topic=" + encodeURIComponent(topic);
        
        const res = await fetch(url);
        const data = await res.json();
        
        const labels = data.histogram.map(b => b.bin_start.toFixed(3) + "s");
        const counts = data.histogram.map(b => b.count);
        
        const ctx = document.getElementById('histogramChart').getContext('2d');
        if (histogramChartObj) histogramChartObj.destroy();
        
        histogramChartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '메시지 수',
                    data: counts,
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    async function fetchTrend(topic) {
        let url = "/api/latency-trend?limit=200&window=10";
        if (topic) url += "&topic=" + encodeURIComponent(topic);
        
        const res = await fetch(url);
        const data = await res.json();
        
        const labels = data.trend.map((_, i) => "#" + (i+1));
        const values = data.trend;
        
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChartObj) trendChartObj.destroy();
        
        trendChartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Moving Average (sec)',
                    data: values,
                    borderColor: 'rgba(239, 68, 68, 1)',
                    backgroundColor: 'rgba(239, 68, 68, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    function refreshAll() {
        const topic = document.getElementById("topicInput").value.trim();
        fetchHistogram(topic);
        fetchTrend(topic);
    }

    window.onload = () => {
        refreshAll();
    };
</script>
</body>
</html>
