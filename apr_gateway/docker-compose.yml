services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  apr-gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      SOURCE_MQTT_HOST: mosquitto
      SOURCE_MQTT_PORT: 1883
      TARGET_MQTT_HOST: mosquitto
      TARGET_MQTT_PORT: 1883
      SUBSCRIBE_TOPIC: iot/raw/#
      PUBLISH_PREFIX: iot/optimized
      APR_MODE: proxy
      DEFAULT_QOS: 0
      DEFAULT_COMPRESSION: none
      DEFAULT_ENCRYPTION: none
      DEFAULT_INTEGRITY: none
      MODEL_DIR: /app/models
    depends_on:
      - mosquitto
